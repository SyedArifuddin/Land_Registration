<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Mobile Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #001529;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .btn-gold {
            background-color: #b8860b;
            color: white;
            font-weight: bold;
            border: none;
        }
        .btn-gold:hover {
            background-color: #966d09;
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: none;
            border-color: #b8860b;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🔐 Verify Identity</h2>
            <p class="text-white-50 small">Confirm credentials to unlock terminal</p>
        </div>

        <form action="/mobile_verify" method="POST">
            <input type="hidden" name="device_id" value="{{ device_id }}">

            <div class="mb-3">
                <label class="form-label small">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-4">
                <label class="form-label small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-2">AUTHORIZE ACCESS</button>
        </form>
    </div>

</body>
</html>
