<!DOCTYPE html>
<html>
<head>
    <title>Public Ledger | LandChain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Immutable Transaction History</h2>
        <div class="accordion" id="blockchainAccordion">
            {% for block in chain %}
            <div class="accordion-item mb-3 border shadow-sm">
                <h2 class="accordion-header">
                    <button class="accordion-button {% if not loop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#block{{ block.index }}">
                        Block #{{ block.index }} 
                        <span class="ms-3 badge {% if block.index == 1 %}bg-info{% else %}bg-primary{% endif %}">
                            {{ "Genesis" if block.index == 1 else "Land Transfer" }}
                        </span>
                    </button>
                </h2>
                <div id="block{{ block.index }}" class="accordion-collapse collapse {% if loop.first %}show{% endif %}" data-bs-parent="#blockchainAccordion">
                    <div class="accordion-body">
                        <div class="row">
                            <div class="col-md-6">
                                <strong>Block Hash:</strong>
                                <p class="hash-text bg-light p-2">{{ block.hash }}</p>
                            </div>
                            <div class="col-md-6">
                                <strong>Previous Hash:</strong>
                                <p class="hash-text bg-light p-2">{{ block.previous_hash }}</p>
                            </div>
                        </div>
                        <div class="mt-3">
                            <strong>Data Contained:</strong>
                            <pre class="bg-dark text-success p-3 rounded">{{ block.transactions | tojson(indent=2) }}</pre>
                        </div>
                        <small class="text-muted">Timestamp: {{ block.timestamp }}</small>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
