<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Mobile Auth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #001a33; color: white; padding: 40px 20px; font-family: 'Segoe UI', sans-serif; }
        .mobile-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid #b8860b; }
        .form-control { background: #002b52; border: 1px solid #444; color: white; margin-bottom: 20px; padding: 12px; }
        .btn-gold { background: #b8860b; color: #001a33; font-weight: bold; width: 100%; padding: 12px; border: none; }
    </style>
</head>
<body>
    <div class="mobile-card">
        <div class="text-center mb-4">
            <h4 style="color: #b8860b;">DEVICE SYNC</h4>
            <p class="small text-white-50">Log in to authorize your laptop session</p>
        </div>
        
        <form method="POST">
            <label class="small fw-bold">ADMIN USERNAME</label>
            <input type="text" name="username" class="form-control" placeholder="Enter ID" required>
            
            <label class="small fw-bold">PASSPHRASE</label>
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            
            <button type="submit" class="btn btn-gold">AUTHORIZE WORKSTATION</button>
        </form>
    </div>
</body>
</html>
