<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Identity | LandChain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="mb-2" style="font-size: 2.5rem;">🔑</div>
                <h2 class="auth-title">Register Identity</h2>
                <p class="text-muted small">Join the Immutable Land Registry Network</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-warning py-2 small text-center">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/signup" method="POST">
                <div class="mb-3">
                    <label class="form-label">Desired Username</label>
                    <input type="text" name="username" class="form-control" placeholder="e.g. officer_smith" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Secure Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Authority Level</label>
                    <select name="role" class="form-select">
                        <option value="user">Public User (View Only)</option>
                        <option value="admin">Government Registrar (Authorize & Mine)</option>
                    </select>
                    <div class="form-text mt-2 small">
                        *Admins can add new land records to the blockchain.
                    </div>
                </div>

                <button type="submit" class="btn btn-auth w-100 mb-3">Initialize 2FA Setup</button>
            </form>

            <div class="text-center">
                <p class="small text-muted mb-0">Already registered? 
                    <a href="/login" class="text-decoration-none fw-bold">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
