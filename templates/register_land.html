<!DOCTYPE html>
<html>
<head>
    <title>New Registration | LandChain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">New Land Registration</h3>
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Legal Owner Name</label>
                                <input type="text" name="owner" class="form-control" placeholder="e.g. John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Property Plot ID</label>
                                <input type="text" name="land_id" class="form-control" placeholder="e.g. BLK-99-TX" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Land Area (Sq Ft)</label>
                                <input type="number" name="area" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Broadcast to Blockchain</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
