<!DOCTYPE html>
<html>
<head>
    <title>Citizen Access | Blockchain Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e14; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .auth-card { background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; width: 400px; }
        .btn-gov { background: #238636; color: white; border: none; }
        .btn-gov:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h3 class="text-center mb-4">{{ 'Create Citizen Account' if mode == 'signup' else 'Citizen Sign In' }}</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-gov w-100 mb-3">
                {{ 'Create Account' if mode == 'signup' else 'Access Registry' }}
            </button>
            
            <div class="text-center">
                {% if mode == 'login' %}
                    <p class="small">New to the registry? <a href="{{ url_for('citizen.signup') }}">Sign Up</a></p>
                {% else %}
                    <p class="small">Already have an account? <a href="{{ url_for('citizen.login') }}">Sign In</a></p>
                {% endif %}
            </div>
        </form>
    </div>
</body>
</html>
