<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Challenge | Link Device</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #001a33; color: white; font-family: 'Cinzel', serif; }
        .login-card { background: rgba(0, 0, 0, 0.8); border: 2px solid #b8860b; padding: 40px; margin-top: 100px; border-radius: 15px; }
        .form-control { background: #002b52; border: 1px solid #b8860b; color: white; }
        .btn-imperial { background: #b8860b; color: #001a33; font-weight: bold; width: 100%; padding: 12px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center">
        <div class="col-md-5 login-card">
            <h2 class="text-center" style="color: #b8860b;">NEW DEVICE LINK</h2>
            <p class="text-center small mb-4 text-info">IDENTIFY PERSONNEL TO REGISTER SHARD</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small">Administrative ID</label>
                    <input type="text" name="username" class="form-control" placeholder="Create Username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small">Security Passphrase</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-imperial">AUTHENTICATE & SAVE DEVICE</button>
            </form>
        </div>
    </div>
</body>
</html>
