{% extends "public_dashboard.html" %}
{% block sub_content %}
<h3 class="fw-bold mb-4">Security Audit Trail</h3>
<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Timestamp</th>
                    <th>Hash Checked</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td><small class="text-muted">{{ log.attempted_hash[:40] }}...</small></td>
                    <td>
                        <span class="badge {{ 'bg-success' if log.result == 'Success' else 'bg-danger' }}">
                            {{ log.result }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
