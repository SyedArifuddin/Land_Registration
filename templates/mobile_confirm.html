<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sovereign Auth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #001a33; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; font-family: 'Inter', sans-serif; }
        .confirm-box { border: 1px solid #b8860b; padding: 40px; border-radius: 15px; background: rgba(0,0,0,0.5); }
        .btn-gold { background: #b8860b; color: white; font-weight: bold; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="confirm-box mx-3">
        <h1 style="color: #b8860b;">⚜️</h1>
        <h3>Authorize Access</h3>
        <p class="text-white-50 small">Workstation login requested for:</p>
        <h4 class="mb-4">{{ username }}</h4>
        <form method="POST">
            <button type="submit" class="btn btn-gold shadow">CONFIRM LOGIN</button>
        </form>
    </div>
</body>
</html>
